<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="SUUCHAT">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d946ef"/>
      <stop offset="0.55" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="tad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#bdf3ff"/>
    </linearGradient>
  </defs>
  <!-- latar membulat (aman utk ikon maskable) -->
  <rect x="0" y="0" width="512" height="512" rx="120" fill="url(#bg)"/>
  <!-- lingkaran -->
  <circle cx="256" cy="256" r="188" fill="#ffffff" fill-opacity="0.08"/>
  <circle cx="256" cy="256" r="188" fill="none" stroke="#ffffff" stroke-opacity="0.95" stroke-width="14"/>
  <!-- kecebong (tadpole): ekor melengkung + kepala bulat -->
  <path d="M150 196 C 120 250, 150 300, 210 300 C 250 300, 268 274, 300 270 C 250 250, 250 222, 210 200 C 188 188, 168 186, 150 196 Z"
        fill="url(#tad)" transform="rotate(-8 230 248)"/>
  <!-- kepala kecebong -->
  <circle cx="206" cy="206" r="62" fill="url(#tad)"/>
  <!-- mata -->
  <circle cx="224" cy="196" r="13" fill="#2a2150"/>
  <circle cx="229" cy="191" r="4.5" fill="#ffffff"/>
  <!-- huruf SCHT -->
  <text x="256" y="372" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="92" font-weight="bold" fill="#ffffff" letter-spacing="2">SCHT</text>
</svg>
