<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ChatLoop">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="loop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9333ea"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
  </defs>

  <!-- app tile -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>

  <!-- chat bubble + tail -->
  <rect x="9" y="10" width="46" height="35" rx="11" fill="#fff"/>
  <path d="M20 43 L14 54 L31 45 Z" fill="#fff"/>

  <!-- single clean loop (infinity) -->
  <path d="M32 27 C 29 20 20 20 20 27 C 20 34 29 34 32 27 C 35 20 44 20 44 27 C 44 34 35 34 32 27 Z"
        fill="none" stroke="url(#loop)" stroke-width="5.2"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
